name: Generate GEX Levels
on:
  schedule:
    - cron: '30 10 * * 1-5'   # 6:30 AM ET (EDT) Mon-Fri
  workflow_dispatch: {}        # manual trigger
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python generate_gex.py
      - name: Commit updated levels
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "GEX $(date -u +%Y-%m-%d)"
          git push
